spring:
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: #{system_env.AI_OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1536
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1536
        max-document-batch-size: 10000
        table-name: t_vector_store
  servlet:
    multipart:
      max-file-size: 10MB # 单个文件大小限制
      max-request-size: 10MB #总请求大小限制
  #      base-url: https://api.zhizengzeng.com/v1
#      api-key: #{system_env.AI_OPENAI_API_KEY}
#      chat:
#        options:
#          model: gpt-4o
#          temperature: 0.7
  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver #驱动名
    url: jdbc:p6spy:postgresql://localhost:5432/robot #URL
    username: postgres
    password: postgres
    hikari:
      pool-name: AI-Robot-HikariCP
      auto-commit: true
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      minimum-idle: 5
      maximum-pool-size: 20
      connection-test-query: SELECT 1
      validation-timeout: 5000

okhttp:
  connect-timeout: 10000
  read-timeout: 600000
  write-timeout: 600000
  max-idle-connections: 200
  keep-alive-duration: 300

searxng:
  url: http://localhost:8888/search
  count: 10
customer-service:
  file-storage-path: D:\\IdeaProjects\\new-ai-robot
  chunk-path: D:\\IdeaProjects\\new-ai-robot\\chunk
  model: qwen-plus-2025-07-28
  temperature: 0.0
